<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>延期审批</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="dashboard.html" class="navbar-back">←</a>
      <div class="navbar-title">延期审批</div>
    </div>
  </nav>

  <!-- 状态Tab -->
  <div class="tabs" id="statusTabs">
    <div class="tab-item active" data-status="all" onclick="switchTab('all', this)">全部</div>
    <div class="tab-item" data-status="待审批" onclick="switchTab('待审批', this)">待审批<span class="tab-badge" id="pendingBadge">0</span></div>
    <div class="tab-item" data-status="已通过" onclick="switchTab('已通过', this)">已通过</div>
    <div class="tab-item" data-status="已拒绝" onclick="switchTab('已拒绝', this)">已拒绝</div>
  </div>

  <div class="main-content" id="approvalList" style="min-height:300px">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- 审批弹窗 -->
  <div class="modal-overlay center" id="approvalModal">
    <div class="modal-content">
      <div class="modal-title">审批延期申请</div>
      <div id="approvalDetail"></div>
      <form id="approvalForm" onsubmit="submitApproval(event)">
        <div class="form-group">
          <label class="form-label required">审批意见</label>
          <textarea class="form-textarea" id="approvalOpinion" placeholder="请填写审批意见" data-required></textarea>
          <div class="form-error">请填写审批意见</div>
        </div>
        <div class="confirm-buttons">
          <button type="button" class="btn btn-danger" onclick="submitApprovalAction('rejected')">拒绝</button>
          <button type="button" class="btn btn-success" onclick="submitApprovalAction('approved')">同意</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/mock.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!user) window.location.href = 'login.html';

    let currentTab = 'all';
    let currentApprovalId = null;

    function updateBadge() {
      const pending = getFilteredApprovals().filter(a => a.status === '待审批').length;
      document.getElementById('pendingBadge').textContent = pending;
    }
    updateBadge();

    function switchTab(status, el) {
      currentTab = status;
      document.querySelectorAll('#statusTabs .tab-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderList();
    }

    function renderList() {
      const container = document.getElementById('approvalList');
      let data = getFilteredApprovals();
      if (currentTab !== 'all') {
        data = data.filter(a => a.status === currentTab);
      }

      if (data.length === 0) {
        container.innerHTML = renderEmpty('暂无审批记录');
        return;
      }

      const canApprove = user.role !== 'salesman';
      container.innerHTML = data.map(a => `
        <div class="card" onclick="${a.status === '待审批' && canApprove ? `openApproval('${a.id}')` : ''}">
          <div class="card-header">
            <div class="card-title">${a.ledgerName}</div>
            ${getApprovalStatusTag(a.status)}
          </div>
          <div class="card-row"><span class="label">申请人</span><span class="value">${a.applicantName}</span></div>
          <div class="card-row"><span class="label">原计划时间</span><span class="value">${formatDate(a.originalDate)}</span></div>
          <div class="card-row"><span class="label">申请延期至</span><span class="value" style="color:#fa8c16;font-weight:500">${formatDate(a.newDate)}</span></div>
          <div class="card-row"><span class="label">申请原因</span><span class="value" style="font-size:12px">${a.reason}</span></div>
          ${a.opinion ? `<div class="card-row"><span class="label">审批意见</span><span class="value">${a.opinion}</span></div>` : ''}
          ${a.status === '待审批' && canApprove ? `
            <div class="card-footer">
              <span style="font-size:12px;color:#1677ff">点击卡片进行审批 →</span>
            </div>` : ''}
          ${a.status === '待审批' && !canApprove ? `
            <div class="card-footer">
              <span style="font-size:12px;color:#999">等待审批中</span>
            </div>` : ''}
        </div>
      `).join('');
    }

    function openApproval(id) {
      currentApprovalId = id;
      const a = MOCK.delayApprovals.find(x => x.id === id);
      if (!a) return;

      document.getElementById('approvalDetail').innerHTML = `
        <div style="background:#f7f8fa;border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px">
          <div class="detail-row"><span class="detail-label" style="width:70px">项目名称</span><span class="detail-value">${a.ledgerName}</span></div>
          <div class="detail-row"><span class="detail-label" style="width:70px">申请人</span><span class="detail-value">${a.applicantName}</span></div>
          <div class="detail-row"><span class="detail-label" style="width:70px">原计划时间</span><span class="detail-value">${a.originalDate}</span></div>
          <div class="detail-row"><span class="detail-label" style="width:70px">新计划时间</span><span class="detail-value" style="color:#fa8c16">${a.newDate}</span></div>
          <div class="detail-row"><span class="detail-label" style="width:70px">申请原因</span><span class="detail-value">${a.reason}</span></div>
        </div>
      `;
      document.getElementById('approvalOpinion').value = '';
      document.getElementById('approvalForm').querySelector('.form-group').classList.remove('error');
      openModal('approvalModal');
    }

    function submitApprovalAction(result) {
      const opinion = document.getElementById('approvalOpinion').value.trim();
      if (!opinion) {
        document.getElementById('approvalForm').querySelector('.form-group').classList.add('error');
        showToast('请填写审批意见');
        return;
      }

      const approval = MOCK.delayApprovals.find(a => a.id === currentApprovalId);
      if (!approval) return;

      approval.status = result === 'approved' ? '已通过' : '已拒绝';
      approval.opinion = opinion;

      const ledger = MOCK.ledgers.find(l => l.id === approval.ledgerId);
      if (ledger && result === 'approved') {
        ledger.planDate = approval.newDate;
        MOCK.collectRecords.push({
          id: 'R' + Date.now(), ledgerId: ledger.id, type: '延期',
          content: `延期审批通过：原计划${approval.originalDate}，延期至${approval.newDate}`,
          operator: user.id, time: new Date().toLocaleString('zh-CN')
        });
      }

      closeModal('approvalModal');
      showToast(result === 'approved' ? '已同意延期申请' : '已拒绝延期申请');
      updateBadge();
      renderList();
    }

    function submitApproval(e) {
      e.preventDefault();
      // handled by submitApprovalAction
    }

    renderList();
  </script>
</body>
</html>
