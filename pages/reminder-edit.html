<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>编辑提醒规则</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="reminder-rules.html" class="navbar-back">←</a>
      <div class="navbar-title" id="pageTitle">新建提醒规则</div>
    </div>
  </nav>

  <div class="main-content">
    <form id="ruleForm" onsubmit="saveRule(event)">
      <div class="form-group">
        <label class="form-label required">规则名称</label>
        <input class="form-input" id="ruleName" placeholder="如：即将到期提醒-3天" data-required>
        <div class="form-error">请输入规则名称</div>
      </div>

      <div class="form-group">
        <label class="form-label">是否启用</label>
        <div style="padding-top:6px">
          <label class="toggle-switch">
            <input type="checkbox" id="ruleEnabled" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">触发条件</label>
        <div style="display:flex;gap:8px;align-items:center">
          <select class="form-select" id="triggerType" style="flex:1" onchange="updateCondition()">
            <option value="before">距离承诺日期</option>
            <option value="after">逾期</option>
          </select>
          <input class="form-input" id="triggerDays" type="number" placeholder="天数" style="width:80px" value="3" min="0">
          <span style="font-size:13px;color:#999">天</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label required">通知对象</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding-top:4px">
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
            <input type="checkbox" class="target-check" value="salesman" checked> 业务员
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
            <input type="checkbox" class="target-check" value="admin"> 管理员
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
            <input type="checkbox" class="target-check" value="finance"> 财务人员
          </label>
        </div>
        <div class="form-error" id="targetError">请至少选择一个通知对象</div>
      </div>

      <div class="form-group">
        <label class="form-label required">通知频率</label>
        <select class="form-select" id="ruleFrequency" data-required>
          <option value="立即">立即</option>
          <option value="每日" selected>每日</option>
          <option value="每周">每周</option>
          <option value="仅一次">仅一次</option>
        </select>
        <div class="form-error">请选择通知频率</div>
      </div>

      <div class="form-group">
        <label class="form-label required">通知内容</label>
        <textarea class="form-textarea" id="ruleContent" placeholder="可使用模板变量：{项目名称}、{应收金额}、{差额}" data-required></textarea>
        <div class="form-error">请输入通知内容</div>
      </div>

      <!-- 模板快捷插入 -->
      <div style="margin-bottom:14px">
        <label class="form-label">默认模板</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <span class="filter-tag" style="cursor:pointer" onclick="insertTemplate('before')">到期提醒</span>
          <span class="filter-tag" style="cursor:pointer" onclick="insertTemplate('overdue')">逾期提醒</span>
        </div>
      </div>

      <!-- 预览 -->
      <div class="card" style="background:#f7f8fa;margin-bottom:16px">
        <div style="font-size:13px;color:#999;margin-bottom:6px">📩 消息预览</div>
        <div id="previewContent" style="font-size:13px;color:#333;line-height:1.6"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">保存规则</button>
    </form>
  </div>

  <script src="../js/mock.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!user) window.location.href = 'login.html';

    const params = new URLSearchParams(window.location.search);
    const ruleId = params.get('id');
    let isEdit = !!ruleId;

    if (isEdit) {
      document.getElementById('pageTitle').textContent = '编辑提醒规则';
      const rule = MOCK.reminderRules.find(r => r.id === ruleId);
      if (rule) {
        document.getElementById('ruleName').value = rule.name;
        document.getElementById('ruleEnabled').checked = rule.enabled;
        document.getElementById('ruleFrequency').value = rule.frequency;
        document.getElementById('ruleContent').value = rule.content;
        // 解析触发条件
        if (rule.conditions.startsWith('距离承诺日期')) {
          document.getElementById('triggerType').value = 'before';
          document.getElementById('triggerDays').value = rule.conditions.match(/\d+/)[0];
        } else if (rule.conditions.startsWith('逾期')) {
          document.getElementById('triggerType').value = 'after';
          document.getElementById('triggerDays').value = rule.conditions.match(/\d+/)[0];
        }
        // 设置通知对象
        document.querySelectorAll('.target-check').forEach(cb => {
          cb.checked = rule.targets.includes(cb.value);
        });
      }
    }

    function updateCondition() {}

    function insertTemplate(type) {
      const templates = {
        'before': '项目【{项目名称}】的应收款将于{天数}天后到期，应收金额【{应收金额}】元，请及时跟进催收。',
        'overdue': '项目【{项目名称}】已逾期{天数}天，逾期金额【{差额}】元，请尽快催收处理。'
      };
      document.getElementById('ruleContent').value = templates[type] || '';
      updatePreview();
    }

    // 实时预览
    document.getElementById('ruleContent').addEventListener('input', updatePreview);
    document.getElementById('triggerDays').addEventListener('input', updatePreview);
    document.getElementById('triggerType').addEventListener('change', updatePreview);

    function updatePreview() {
      const content = document.getElementById('ruleContent').value;
      const days = document.getElementById('triggerDays').value || '?';
      const preview = content
        .replace(/\{项目名称\}/g, '上海浦东新区智慧园区项目')
        .replace(/\{应收金额\}/g, '¥2,500,000.00')
        .replace(/\{差额\}/g, '¥2,500,000.00')
        .replace(/\{天数\}/g, days);
      document.getElementById('previewContent').textContent = preview || '（请输入通知内容）';
    }
    updatePreview();

    function saveRule(e) {
      e.preventDefault();
      if (!validateForm(document.getElementById('ruleForm'))) return;

      const targets = Array.from(document.querySelectorAll('.target-check:checked')).map(cb => cb.value);
      if (targets.length === 0) {
        document.getElementById('targetError').style.display = 'block';
        showToast('请至少选择一个通知对象');
        return;
      }
      document.getElementById('targetError').style.display = 'none';

      const name = document.getElementById('ruleName').value;
      const enabled = document.getElementById('ruleEnabled').checked;
      const triggerType = document.getElementById('triggerType').value;
      const days = document.getElementById('triggerDays').value;
      const conditions = triggerType === 'before' ? `距离承诺日期 ${days} 天` : `逾期 ${days} 天`;
      const frequency = document.getElementById('ruleFrequency').value;
      const content = document.getElementById('ruleContent').value;

      if (isEdit) {
        const rule = MOCK.reminderRules.find(r => r.id === ruleId);
        if (rule) {
          rule.name = name;
          rule.enabled = enabled;
          rule.conditions = conditions;
          rule.targets = targets;
          rule.frequency = frequency;
          rule.content = content;
        }
      } else {
        MOCK.reminderRules.push({
          id: 'RM' + String(MOCK.reminderRules.length + 1).padStart(3, '0'),
          name, enabled, conditions, targets, frequency, content
        });
      }

      showToast(isEdit ? '规则已更新' : '规则已创建');
      setTimeout(() => {
        window.location.href = 'reminder-rules.html';
      }, 500);
    }
  </script>
</body>
</html>
